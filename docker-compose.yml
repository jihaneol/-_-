services:
  mysql:
    image: mysql:8.4
    container_name: card-service-mysql
    environment:
      MYSQL_DATABASE: card_service
      MYSQL_USER: card_service
      MYSQL_PASSWORD: card_service
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
